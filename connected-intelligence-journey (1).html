<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Day in the Life — Connected Intelligence Journey</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap');

:root {
  --navy:      #0E1B2A;
  --navy-2:    #152436;
  --teal:      #0E7C86;
  --teal-d:    #0A5D65;
  --teal-t:    #E6F2F3;
  --teal-l:    #BDDDDF;
  --paper:     #F0F4F7;
  --white:     #FFFFFF;
  --slate:     #5B6B7B;
  --slate-2:   #8A98A6;
  --amber:     #B5740C;
  --amber-t:   #FBF1DF;
  --green:     #2F7D4F;
  --green-t:   #E7F2EB;
  --line:      #D0D7DE;
  --ink:       #1A2B3C;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--navy);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── TOP BAR ── */
.topbar {
  background: var(--navy);
  border-bottom: 1px solid #1E2E3E;
  padding: 14px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.tb-left { display: flex; align-items: center; gap: 14px; }
.tb-mark {
  width: 28px; height: 28px; border-radius: 7px;
  background: linear-gradient(135deg, var(--teal), var(--teal-d));
  display: grid; place-items: center;
}
.tb-mark svg { width: 15px; height: 15px; }
.tb-title { font-size: 14px; font-weight: 600; color: var(--white); letter-spacing: -.1px; }
.tb-sub { font-size: 11px; color: #5A7A90; margin-top: 1px; }
.tb-right { display: flex; align-items: center; gap: 18px; }
.tb-persona {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,.06); border: 1px solid #1E2E3E;
  border-radius: 8px; padding: 6px 12px;
}
.tb-persona .av {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--teal-t); color: var(--teal-d);
  font-size: 10px; font-weight: 700;
  display: grid; place-items: center;
  border: 1px solid var(--teal-l);
}
.tb-persona .pn { font-size: 12px; color: #C3CDD7; }
.tb-persona .pr { font-size: 10px; color: #5A7A90; }
.step-counter { font-size: 12px; color: #5A7A90; }
.step-counter b { color: var(--teal); font-weight: 700; }

/* ── TIMELINE RAIL ── */
.rail-wrap {
  background: var(--navy-2);
  border-bottom: 1px solid #1E2E3E;
  padding: 0 40px;
  flex-shrink: 0;
  overflow: hidden;
  position: relative;
}

.rail {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 18px 0 16px;
  position: relative;
}

/* the continuous context thread line */
.rail-line {
  position: absolute;
  top: 50%;
  left: 0; right: 0;
  height: 2px;
  transform: translateY(-50%);
  background: #1A2E40;
  z-index: 0;
}
.rail-line-active {
  position: absolute;
  top: 50%;
  left: 0;
  height: 2px;
  transform: translateY(-50%);
  background: linear-gradient(90deg, var(--teal-d), var(--teal));
  z-index: 1;
  transition: width .6s cubic-bezier(.4,0,.2,1);
  width: 0%;
}

.rail-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  position: relative;
  z-index: 2;
  cursor: pointer;
  gap: 6px;
}

.rs-node {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid #243444;
  background: #192433;
  display: grid; place-items: center;
  transition: all .25s;
  position: relative;
}
.rs-node svg { width: 14px; height: 14px; stroke: #405060; transition: stroke .25s; }
.rs-node .pulse-ring {
  position: absolute; inset: -6px;
  border-radius: 50%;
  border: 1.5px solid var(--teal);
  opacity: 0;
  animation: none;
}
.rail-step.active .rs-node {
  border-color: var(--teal);
  background: var(--teal-d);
  box-shadow: 0 0 0 4px rgba(14,124,134,.2);
}
.rail-step.active .rs-node svg { stroke: var(--white); }
.rail-step.active .pulse-ring { opacity: 1; animation: pulse 1.8s ease infinite; }
.rail-step.done .rs-node { border-color: var(--teal-d); background: rgba(10,93,101,.25); }
.rail-step.done .rs-node svg { stroke: var(--teal); }
@keyframes pulse {
  0% { transform: scale(1); opacity: .7; }
  70% { transform: scale(1.6); opacity: 0; }
  100% { transform: scale(1.6); opacity: 0; }
}

.rs-time { font-size: 9.5px; font-weight: 700; color: #405060; letter-spacing: .5px; transition: color .25s; }
.rs-label { font-size: 10px; color: #405060; text-align: center; line-height: 1.3; max-width: 72px; transition: color .25s; }
.rail-step.active .rs-time { color: var(--teal); }
.rail-step.active .rs-label { color: #A8C0CC; }
.rail-step.done .rs-time { color: var(--teal-d); }
.rail-step.done .rs-label { color: #5A7A90; }

/* context carry labels */
.carry-label {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 8.5px; font-weight: 600;
  color: var(--teal);
  white-space: nowrap;
  opacity: 0;
  transition: opacity .4s;
  pointer-events: none;
}
.rail-step.done .carry-label { opacity: 1; }

/* ── MAIN STAGE ── */
.stage {
  flex: 1;
  display: grid;
  grid-template-columns: 340px 1fr 300px;
  min-height: 0;
  overflow: hidden;
}

/* LEFT — step detail */
.step-panel {
  background: var(--paper);
  border-right: 1px solid var(--line);
  padding: 28px 26px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.sp-channel {
  display: flex; align-items: center; gap: 11px;
}
.sp-channel .ch-icon {
  width: 42px; height: 42px; border-radius: 11px;
  display: grid; place-items: center; flex-shrink: 0;
}
.sp-channel .ch-icon svg { width: 20px; height: 20px; }
.sp-channel .ch-meta b { font-size: 15px; font-weight: 700; color: var(--ink); display: block; }
.sp-channel .ch-meta span { font-size: 11.5px; color: var(--slate); }

.sp-scenario {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 16px 17px;
}
.sp-scenario .sc-eyebrow {
  font-size: 9.5px; text-transform: uppercase; letter-spacing: 1px;
  font-weight: 700; color: var(--teal-d); margin-bottom: 8px;
}
.sp-scenario .sc-title {
  font-family: 'Fraunces', serif;
  font-size: 18px; font-weight: 500; color: var(--ink);
  line-height: 1.2; margin-bottom: 10px;
  letter-spacing: -.2px;
}
.sp-scenario .sc-body {
  font-size: 13px; color: var(--slate); line-height: 1.55;
}

.sp-what {
  background: var(--teal-d);
  border: 1px solid var(--teal);
  border-radius: 9px;
  padding: 12px 14px;
}
.sp-what .sw-h {
  font-size: 10px; text-transform: uppercase; letter-spacing: .8px;
  font-weight: 700; color: #7DD8DE; margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.sp-what .sw-item {
  font-size: 12px; color: #C8E8EC; line-height: 1.4;
  margin-bottom: 5px; display: flex; gap: 7px; align-items: flex-start;
}
.sp-what .sw-item::before { content: '→'; color: #5DD0D8; font-weight: 700; flex-shrink: 0; font-size: 11px; margin-top: 1px; }
.sp-what .sw-item:last-child { margin-bottom: 0; }

/* CENTRE — visualisation canvas */
.vis-area {
  background: var(--white);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  padding: 30px;
}

.scene { width: 100%; max-width: 480px; position: relative; }

/* device mockups */
.device-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}
.device {
  border-radius: 14px;
  border: 2px solid var(--line);
  background: var(--paper);
  box-shadow: 0 4px 20px rgba(14,27,42,.1);
  overflow: hidden;
  animation: deviceIn .4s cubic-bezier(.2,.8,.2,1) both;
  position: relative;
}
@keyframes deviceIn {
  from { opacity: 0; transform: translateY(12px) scale(.97); }
  to { opacity: 1; transform: none; }
}
.device.desktop { width: 380px; min-height: 220px; border-radius: 10px; }
.device.mobile { width: 130px; min-height: 230px; border-radius: 22px; }
.device.watch { width: 80px; min-height: 90px; border-radius: 20px; }
.device.email-d { width: 320px; min-height: 180px; }
.device.teams { width: 340px; min-height: 200px; }

.device .dbar {
  background: var(--navy);
  padding: 7px 10px;
  display: flex; align-items: center; gap: 6px;
}
.device .dbar .dot { width: 7px; height: 7px; border-radius: 50%; }
.device .dbar .dot.r { background: #E05A4E; }
.device .dbar .dot.a { background: #D0A020; }
.device .dbar .dot.g { background: #3A9E5C; }
.device .dbar .url { font-size: 9px; color: #5A7A90; margin-left: 4px; flex: 1; }

.device .mbody { padding: 12px; }
.device .screen-label {
  font-size: 9px; text-transform: uppercase; letter-spacing: .8px;
  font-weight: 700; color: var(--teal-d); margin-bottom: 8px;
}
.device .screen-val {
  font-family: 'Fraunces', serif;
  font-size: 22px; font-weight: 500; color: var(--ink);
  letter-spacing: -.3px; margin-bottom: 4px;
}
.device .screen-sub { font-size: 11px; color: var(--slate); line-height: 1.4; }

.alert-banner {
  background: var(--amber-t);
  border: 1px solid #E8D9B8;
  border-radius: 7px;
  padding: 8px 10px;
  margin-top: 10px;
  font-size: 11px; color: var(--amber);
  display: flex; gap: 7px; align-items: flex-start;
  animation: slideIn .35s ease both;
  animation-delay: .3s;
  opacity: 0;
}
.alert-banner svg { width: 13px; height: 13px; flex-shrink: 0; margin-top: 1px; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

.notif {
  background: var(--navy);
  border-radius: 12px;
  padding: 11px 13px;
  display: flex; gap: 10px; align-items: flex-start;
  animation: deviceIn .4s ease both;
  animation-delay: .2s;
  max-width: 280px;
}
.notif .n-icon {
  width: 28px; height: 28px; border-radius: 8px;
  background: linear-gradient(135deg, var(--teal), var(--teal-d));
  display: grid; place-items: center; flex-shrink: 0;
}
.notif .n-icon svg { width: 14px; height: 14px; }
.notif .n-b b { font-size: 12px; color: var(--white); display: block; }
.notif .n-b p { font-size: 11px; color: #8FA8BC; margin-top: 3px; line-height: 1.35; }

.approve-btn {
  display: flex; gap: 8px; margin-top: 14px;
}
.abtn {
  flex: 1; border: none; border-radius: 9px;
  padding: 9px 0; font-size: 12px; font-weight: 600;
  font-family: inherit; cursor: pointer;
  transition: all .15s;
}
.abtn.yes { background: var(--green-t); color: var(--green); }
.abtn.no { background: #F8E9E7; color: #9B3D30; }

.watch-face {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 10px 6px; text-align: center;
}
.watch-face .wt { font-size: 10px; font-weight: 700; color: var(--ink); line-height: 1.2; }
.watch-face .ws { font-size: 9px; color: var(--slate); margin-top: 4px; }
.watch-btn {
  width: 100%; border: none; border-radius: 6px;
  padding: 6px 0; font-size: 9px; font-weight: 700;
  font-family: inherit; cursor: pointer;
  background: var(--teal-d); color: var(--white);
  margin-top: 7px;
}

.rm-scene {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 16px 18px;
  max-width: 400px;
  width: 100%;
}
.rm-scene .rs-h { font-size: 11px; font-weight: 600; color: var(--slate); margin-bottom: 12px; display: flex; justify-content: space-between; }
.rm-msg { display: flex; gap: 9px; margin-bottom: 10px; }
.rm-msg .av { width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
.rm-msg .av.rm { background: var(--navy); color: var(--white); }
.rm-msg .av.ai { background: var(--teal-t); color: var(--teal-d); border: 1px solid var(--teal-l); }
.rm-bubble { border-radius: 10px; padding: 9px 11px; font-size: 12px; line-height: 1.45; flex: 1; }
.rm-msg.from-rm .rm-bubble { background: var(--white); border: 1px solid var(--line); color: var(--ink); border-top-left-radius: 3px; }
.rm-msg.from-ai .rm-bubble { background: var(--navy); color: #C3CDD7; border-top-left-radius: 3px; }
.rm-msg.from-ai .rm-bubble strong { color: var(--white); }

.briefing-card {
  background: var(--navy);
  border-radius: 12px;
  padding: 16px 18px;
  max-width: 380px; width: 100%;
}
.bc-h { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; color: var(--teal); margin-bottom: 12px; }
.bc-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1E2E3E; font-size: 12px; }
.bc-row:last-child { border-bottom: none; }
.bc-row .bk { color: #8FA8BC; }
.bc-row .bv { color: var(--white); font-weight: 600; }
.bc-row .bv.warn { color: var(--amber); }
.bc-row .bv.ok { color: #6FCF97; }

.agent-log {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 14px 16px;
  max-width: 400px; width: 100%;
  font-family: 'Inter', monospace;
}
.al-h { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; color: var(--navy); margin-bottom: 10px; }
.al-row { font-size: 11px; padding: 6px 8px; border-radius: 6px; margin-bottom: 5px; display: flex; gap: 8px; align-items: flex-start; }
.al-row svg { width: 12px; height: 12px; flex-shrink: 0; margin-top: 1px; }
.al-row.in { background: var(--white); color: var(--slate); border: 1px solid var(--line); }
.al-row.gate { background: var(--amber-t); color: var(--amber); }
.al-row.ok { background: var(--green-t); color: var(--green); font-weight: 600; }

/* context carry overlay */
.ctx-carry {
  position: absolute;
  bottom: 18px;
  left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; align-items: center;
  animation: fadeUp .4s ease both;
  animation-delay: .5s;
  opacity: 0;
}
@keyframes fadeUp { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }
.ctx-tag {
  background: var(--navy);
  border: 1px solid var(--teal-d);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 10px; font-weight: 600; color: var(--teal);
  white-space: nowrap;
}

/* RIGHT — context state panel */
.ctx-panel {
  background: var(--navy-2);
  border-left: 1px solid #1E2E3E;
  padding: 24px 20px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 14px;
}
.ctx-panel .cp-h {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
  font-weight: 700; color: var(--teal); margin-bottom: 4px;
}
.ctx-item {
  background: #0E1B2A;
  border: 1px solid #1E2E3E;
  border-radius: 8px;
  padding: 10px 12px;
  transition: all .3s;
}
.ctx-item.lit {
  border-color: var(--teal-d);
  background: rgba(10,93,101,.15);
}
.ctx-item .ci-k {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .6px; color: #3A5060; margin-bottom: 4px;
  transition: color .3s;
}
.ctx-item.lit .ci-k { color: var(--teal); }
.ctx-item .ci-v {
  font-size: 12px; color: #5A7A90; line-height: 1.4;
  transition: color .3s;
}
.ctx-item.lit .ci-v { color: #A8C8D0; }
.ctx-item .ci-new {
  font-size: 10px; color: var(--teal);
  font-weight: 600; margin-top: 4px;
  display: none;
}
.ctx-item.lit .ci-new { display: block; }

/* ── BOTTOM NAV ── */
.bottomnav {
  background: var(--navy);
  border-top: 1px solid #1E2E3E;
  padding: 14px 40px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.nav-btn {
  display: flex; align-items: center; gap: 8px;
  background: transparent; border: 1px solid #243444;
  border-radius: 9px; padding: 9px 18px;
  font-size: 13px; font-weight: 600; color: #8FA8BC;
  font-family: inherit; cursor: pointer; transition: all .15s;
}
.nav-btn:hover { background: #1A2B3A; color: var(--white); border-color: #34485A; }
.nav-btn:disabled { opacity: .3; cursor: default; }
.nav-btn.primary {
  background: var(--teal-d); border-color: var(--teal-d); color: var(--white);
}
.nav-btn.primary:hover { background: var(--teal); border-color: var(--teal); }
.nav-btn svg { width: 15px; height: 15px; }

.step-dots { display: flex; gap: 7px; align-items: center; }
.sdot { width: 8px; height: 8px; border-radius: 50%; background: #243444; transition: all .25s; cursor: pointer; }
.sdot.done { background: var(--teal-d); }
.sdot.active { background: var(--teal); box-shadow: 0 0 0 3px rgba(14,124,134,.25); width: 10px; height: 10px; }

/* progress hint */
.progress-hint {
  font-size: 11px; color: #3A5060; text-align: center;
  font-style: italic; margin-top: 6px;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="tb-left">
    <div class="tb-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 2a4 4 0 0 1 4 4v1a4 4 0 0 1 0 8v1a4 4 0 0 1-8 0v-1a4 4 0 0 1 0-8V6a4 4 0 0 1 4-4Z"/><circle cx="12" cy="11" r="1.4" fill="#fff" stroke="none"/></svg>
    </div>
    <div>
      <div class="tb-title">A Day in the Life</div>
      <div class="tb-sub">How one treasurer moves across eight interaction channels — and what carries between them</div>
    </div>
  </div>
  <div class="tb-right">
    <div class="tb-persona">
      <div class="av">DM</div>
      <div>
        <div class="pn">Dana Mitchell</div>
        <div class="pr">VP Treasury · Northwind Materials</div>
      </div>
    </div>
    <div class="step-counter">Step <b id="stepNum">1</b> of <b>8</b></div>
  </div>
</div>

<!-- TIMELINE RAIL -->
<div class="rail-wrap">
  <div class="rail" id="rail">
    <div class="rail-line"></div>
    <div class="rail-line-active" id="railProgress"></div>
    <!-- steps injected by JS -->
  </div>
</div>

<!-- STAGE -->
<div class="stage">
  <div class="step-panel" id="stepPanel"><!-- injected --></div>
  <div class="vis-area" id="visArea"><!-- injected --></div>
  <div class="ctx-panel" id="ctxPanel"><!-- injected --></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottomnav">
  <button class="nav-btn" id="btnBack" onclick="go(-1)" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    Previous
  </button>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <div class="step-dots" id="stepDots"></div>
    <div class="progress-hint" id="progressHint"></div>
  </div>
  <button class="nav-btn primary" id="btnNext" onclick="go(1)">
    Next step
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
  </button>
</div>

<script>
const CHANNEL_COLORS = {
  web:      { bg: '#E6F0FB', icon: '#1A5CA8', border: '#B8D0F0' },
  mobile:   { bg: '#E7F2EB', icon: '#2F7D4F', border: '#B8DECA' },
  briefing: { bg: '#0E1B2A', icon: '#0E7C86', border: '#1E2E3E' },
  rm:       { bg: '#F0EAF8', icon: '#6B3FA0', border: '#D8C8F0' },
  voice:    { bg: '#FBF1DF', icon: '#B5740C', border: '#E8D9B8' },
  ipad:     { bg: '#EAF0F8', icon: '#1A5CA8', border: '#B8D0F0' },
  email:    { bg: '#E6F2F3', icon: '#0A5D65', border: '#BDDDDF' },
  agent:    { bg: '#0E1B2A', icon: '#0E7C86', border: '#1E2E3E' },
};

function renderStep(idx) {
  const s = STEPS[idx];
  document.getElementById('stepNum').textContent = idx + 1;

  // Rail
  const rail = document.getElementById('rail');
  const existingSteps = rail.querySelectorAll('.rail-step');
  existingSteps.forEach((el, i) => {
    el.classList.remove('active', 'done');
    if (i < idx) el.classList.add('done');
    if (i === idx) el.classList.add('active');
  });
  // Progress line
  const pct = idx === 0 ? 6 : (idx / (STEPS.length - 1)) * 94 + 3;
  document.getElementById('railProgress').style.width = pct + '%';

  // Step panel
  const col = CHANNEL_COLORS[s.channel];
  document.getElementById('stepPanel').innerHTML = `
    <div class="sp-channel">
      <div class="ch-icon" style="background:${col.bg};border:1.5px solid ${col.border}">
        <svg viewBox="0 0 24 24" fill="none" stroke="${col.icon}" stroke-width="2">${SVG[s.channel].replace(/<svg[^>]*>/,'').replace('</svg>','')}</svg>
      </div>
      <div class="ch-meta">
        <b>${s.channelName}</b>
        <span>${s.channelSub}</span>
      </div>
    </div>
    <div class="sp-scenario">
      <div class="sc-eyebrow">${s.eyebrow}</div>
      <div class="sc-title">${s.title}</div>
      <div class="sc-body">${s.body}</div>
    </div>
    <div class="sp-what">
      <div class="sw-h">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2a4 4 0 0 1 4 4v1a4 4 0 0 1 0 8v1a4 4 0 0 1-8 0v-1a4 4 0 0 1 0-8V6a4 4 0 0 1 4-4Z"/><circle cx="12" cy="11" r="1.3" fill="currentColor" stroke="none"/></svg>
        What the intelligence layer does
      </div>
      ${s.what.map(w => `<div class="sw-item">${w}</div>`).join('')}
    </div>
  `;

  // Vis
  renderVis(s);

  // Context panel
  const ctx = s.ctx;
  const prevCtx = idx > 0 ? STEPS[idx-1].ctx : {};
  document.getElementById('ctxPanel').innerHTML = `
    <div style="color:var(--teal);font-size:10px;text-transform:uppercase;letter-spacing:1.2px;font-weight:700;margin-bottom:6px">Intelligence context</div>
    <div class="progress-hint" style="color:#3A5060;font-size:10.5px;margin-bottom:10px">What the platform carries at this moment</div>
    ${ctx.goal ? `<div class="ctx-item ${prevCtx.goal !== ctx.goal ? 'lit' : ''}">
      <div class="ci-k">Goal state</div>
      <div class="ci-v">${ctx.goal}</div>
      ${prevCtx.goal !== ctx.goal ? `<div class="ci-new">↑ updated this step</div>` : ''}
    </div>` : ''}
    ${ctx.memory ? `<div class="ctx-item">
      <div class="ci-k">Learned preferences</div>
      <div class="ci-v">${ctx.memory}</div>
    </div>` : ''}
    ${ctx.position ? `<div class="ctx-item ${prevCtx.position !== ctx.position ? 'lit' : ''}">
      <div class="ci-k">Current position</div>
      <div class="ci-v">${ctx.position}</div>
      ${prevCtx.position !== ctx.position ? `<div class="ci-new">↑ updated this step</div>` : ''}
    </div>` : ''}
    ${ctx.confidence ? `<div class="ctx-item ${prevCtx.confidence !== ctx.confidence ? 'lit' : ''}">
      <div class="ci-k">Confidence signal</div>
      <div class="ci-v">${ctx.confidence}</div>
      ${prevCtx.confidence !== ctx.confidence ? `<div class="ci-new">↑ updated this step</div>` : ''}
    </div>` : ''}
    ${ctx.carry ? `<div class="ctx-item lit">
      <div class="ci-k">Carried to next channel</div>
      <div class="ci-v">${ctx.carry}</div>
      <div class="ci-new">↑ persists across transition</div>
    </div>` : ''}
    <div style="margin-top:auto;padding-top:16px;border-top:1px solid #1E2E3E">
      <div style="font-size:10px;color:#2A3A48;line-height:1.5">No context is lost at channel boundaries. The platform carries goal state, learned preferences, and position data across every surface — the user never re-explains.</div>
    </div>
  `;

  // Dots
  document.getElementById('stepDots').innerHTML = STEPS.map((_, i) =>
    `<div class="sdot ${i < idx ? 'done' : i === idx ? 'active' : ''}" onclick="goTo(${i})"></div>`
  ).join('');

  // Hints
  const hints = [
    'The day begins — no login, no dashboard refresh',
    'Context from the briefing carries — no re-prompting',
    'Voice input; structured output waits on desktop',
    'The card from the car is already on screen',
    'RM gets an evidenced answer in real time — no callback',
    'Approved from a board meeting — 4 seconds',
    'Email query — answered with a source trace',
    'Overnight — the platform runs without being asked',
  ];
  document.getElementById('progressHint').textContent = hints[idx] || '';

  // Buttons
  document.getElementById('btnBack').disabled = idx === 0;
  const nextBtn = document.getElementById('btnNext');
  if (idx === STEPS.length - 1) {
    nextBtn.innerHTML = `Restart <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>`;
    nextBtn.onclick = () => { current = 0; renderStep(0); };
  } else {
    nextBtn.innerHTML = `Next step <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>`;
    nextBtn.onclick = () => go(1);
  }
}

          <div class="rm-bubble"><strong>$8.7M idle</strong> vs $5M target — $3.7M over. Two ACH receipts cleared Tuesday caused the drift. Payroll buffer is protected at $12M. A $4M sweep to concentration would put her back under target — I can stage it.</div>
        </div>
      </div>
      <div class="ctx-carry">
        <div class="ctx-tag">Full position context available</div>
        <div class="ctx-tag">No callback needed</div>
      </div>
    </div>`;
  } else if (s.vis === 'ipad') {
    html = `<div class="scene" style="max-width:440px">
      <div class="device desktop" style="width:420px;border-radius:16px;border-width:3px">
        <div class="dbar" style="justify-content:space-between;padding:8px 14px">
          <div style="display:flex;gap:5px"><div class="dot r"></div><div class="dot a"></div><div class="dot g"></div></div>
          <div style="font-size:9px;color:#5A7A90;font-weight:600">Treasury · Payments · Approval required</div>
          <div style="font-size:9px;color:#3A5A70">2:15pm</div>
        </div>
        <div class="mbody">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <div class="screen-label" style="margin-bottom:0">Wire pending your approval</div>
            <div style="font-size:10px;font-weight:700;color:#B5740C;background:#FBF1DF;border:1px solid #E8D9B8;padding:3px 9px;border-radius:20px">Personal review required</div>
          </div>
          <div style="background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:12px 14px;margin-bottom:10px">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
              <div><div style="font-size:9.5px;color:var(--slate);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px">Amount</div><div style="font-family:'Fraunces',serif;font-size:20px;font-weight:500;color:var(--ink)">$2.4M</div></div>
              <div><div style="font-size:9.5px;color:var(--slate);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px">Beneficiary</div><div style="font-size:13px;font-weight:600;color:var(--ink);margin-top:3px">Hargrove Logistics</div></div>
              <div><div style="font-size:9.5px;color:var(--slate);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px">Hold reason 1</div><div style="font-size:11.5px;color:var(--ink)">Payee details changed 6 days ago</div></div>
              <div><div style="font-size:9.5px;color:var(--slate);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px">Hold reason 2</div><div style="font-size:11.5px;color:var(--ink)">Amount above $2M personal threshold</div></div>
            </div>
          </div>
          <div class="approve-btn">
            <button class="abtn yes">✓ Approve — Face ID</button>
            <button class="abtn no">Reject</button>

      </div>
      <div class="ctx-carry">
        <div class="ctx-tag">Full context pre-loaded</div>
        <div class="ctx-tag">No platform navigation needed</div>
      </div>
    </div>`;
  } else if (s.vis === 'email') {
    html = `<div class="scene" style="max-width:400px">
      <div class="device email-d" style="width:380px">
        <div class="dbar"><div class="dot r"></div><div class="dot a"></div><div class="dot g"></div><div class="url">Inbox · Re: May net flows</div></div>
        <div class="mbody">
          <div style="font-size:11px;color:var(--slate);margin-bottom:8px">From: assistant · 4:01pm</div>
          <div style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:8px">May net flows: +$13.4M</div>
          <div style="font-size:12px;color:var(--slate);line-height:1.5;margin-bottom:8px">Credits $214.6M less debits $201.2M — both from Table 3, page 108 of your May composite. Fee reversals excluded (below-the-line, Note 11 p.142).</div>
          <div style="background:var(--teal-d);border:1px solid var(--teal);border-radius:7px;padding:8px 10px;font-size:11.5px;color:#C8E8EC">📎 Open live TIR view → </div>
        </div>
      </div>
      <div class="ctx-carry">
        <div class="ctx-tag">Plain email → structured response</div>
        <div class="ctx-tag">Source cited · no black box</div>
      </div>
    </div>`;
  } else if (s.vis === 'agent') {
    html = `<div class="scene" style="max-width:400px">
      <div class="agent-log">
        <div class="al-h">A2A endpoint log · 02:14am</div>
        <div class="al-row in">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2 11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          Request from Northwind TMS agent · $3.0M wire
        </div>
        <div class="al-row gate">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Identity verified · OAuth2 token · scope checked
        </div>
        <div class="al-row ok">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>
          Within $5M delegated scope · known payee · executed
        </div>
        <div class="al-row ok">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/></svg>
          Audit trail written · SR 11-7 log complete
        </div>
      </div>
      <div class="ctx-carry">
        <div class="ctx-tag">Governed endpoint</div>
        <div class="ctx-tag">No human in loop</div>
      </div>
    </div>`;
  }
  area.innerHTML = html;
}

function buildRail() {
  const rail = document.getElementById('rail');
  STEPS.forEach((s, i) => {
    const col = CHANNEL_COLORS[s.channel];
    const div = document.createElement('div');
    div.className = 'rail-step';
    div.onclick = () => goTo(i);
    div.innerHTML = `
      ${s.carry ? `<div class="carry-label">${s.carry}</div>` : ''}
      <div class="rs-node" style="--ch-color:${col.icon}">
        <div class="pulse-ring"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${SVG[s.channel].replace(/<svg[^>]*>/,'').replace('</svg>','')}</svg>
      </div>
      <div class="rs-time">${s.time}</div>
      <div class="rs-label">${s.label}</div>
    `;
    rail.appendChild(div);
  });
}

function go(dir) {
  const next = current + dir;
  if (next < 0 || next >= STEPS.length) return;
  current = next;
  renderStep(current);
}

function goTo(idx) {
  current = idx;
  renderStep(current);
}

buildRail();
renderStep(0);
</script>
</body>
</html>
